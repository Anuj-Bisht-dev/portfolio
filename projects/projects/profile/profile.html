<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url(./image/bg_1.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            color: white;

        }
        .container{
            margin: 170px;
            padding: 10px;
            margin-left: 190px;
            box-shadow: 0 0 10px black;
            height: 450px;
            width: 400px;
            border-radius: 8px;
            
        }
        .photo{
            display: flex;
            justify-content: center;
        }
        .photo img{
            width: 180px;
            height: 160px;
            border-radius:100%;
            border: 1px solid white;
            box-shadow: 0 0 10px white;
        }
        .container h3{
            font-family: Arial, Helvetica, sans-serif;
            letter-spacing: 2px;
            display: flex;
            justify-content: center;
            margin: 10px 0;
            font-size: 25px;
        }
        .container section p{
            line-height: 25px;
            font-size: 20px;
            margin: 30px;
            text-align: center;
        }
        .logo{
            display: flex;
            gap: 45px;
            margin-top: 35px;
            margin-left: 40px;
            
        }
        .logo img{
            width: 35px;
            height: 35px;
        }
        .facebook{
            border-radius: 100%;
        }
        
    </style>
</head>

<body>
    <div class="boody">
        <div class="container">

            <div class="photo">
                <img src="./image/image.jpg" alt="background">
            </div>

            <h3>Anuj Singh Bisht</h3>

            <section>
                <p>Hey, guy's i'm anuj singh bisht and i am pursuing BCA. I am in first semester and this is my profile. And i am targeting for become a full-stack web developer. </p>
            </section>

            <div class="logo">
                <img src="./image/facebook.jpeg" alt="facebook" class="facebook">
                <img src="./image/instagram.png" alt="instagram">
                <img src="./image/twitter.png" alt="twitter">
                <img src="./image/linkedin.png" alt="linkedin">
            </div>
        </div>
    </div>
</body>
</html>
